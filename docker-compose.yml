services:
  postgres:
    image: postgres:16-alpine
    container_name: voxera-v3-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${V3_POSTGRES_DB:-voxera}
      POSTGRES_USER: ${V3_POSTGRES_USER:-voxera}
      POSTGRES_PASSWORD: ${V3_POSTGRES_PASSWORD:-voxera}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: voxera-v3-redis
    restart: unless-stopped
    command: >
      redis-server
      --save ""
      --appendonly no
      --maxmemory ${V3_REDIS_MAXMEMORY:-256mb}
      --maxmemory-policy volatile-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
