    <text x="1342" y="674" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="16" font-weight="700" fill="#B28657">마감일</text>
    <text x="1342" y="702" font-family="Pretendard, Apple SD Gothic Neo, sans-serif" font-size="20" font-weight="700" fill="#5E442B">2026-03-21</text>

