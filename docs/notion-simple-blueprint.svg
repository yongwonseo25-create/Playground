      <stop offset="100%" stop-color="#FFF9F4"/>
    </linearGradient>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FBFEFF"/>
      <stop offset="100%" stop-color="#FFF8EE"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1080" fill="url(#pageBg)"/>
  <rect x="48" y="40" width="1504" height="1000" rx="34" fill="#FFFFFF" filter="url(#shadow)"/>

